{{ if or .Prev .Next -}}
  <nav class="docs-navigation" aria-label="前后文档">
    {{ $pages := where site.RegularPages "Section" .Section -}}
    {{ with $pages.Next . -}}
      <a href="{{ .RelPermalink }}"><span>← 上一篇</span><strong>{{ .Title }}</strong></a>
    {{ end -}}
    {{ with $pages.Prev . -}}
      <a class="next" href="{{ .RelPermalink }}"><span>下一篇 →</span><strong>{{ .Title }}</strong></a>
    {{ end -}}
  </nav>
{{ end -}}
