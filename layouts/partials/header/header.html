<header class="site-header">
  <div class="nav-shell">
    <a class="brand" href="{{ "/" | relLangURL }}" aria-label="JuneOver24 工具箱首页">
      <span class="brand-mark" aria-hidden="true"><span></span></span>
      <span class="brand-copy">
        <strong>JuneOver24</strong>
        <small>TOOLBOX</small>
      </span>
    </a>

    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="site-navigation">
      <span></span><span></span>
      <span class="visually-hidden">打开导航</span>
    </button>

    <nav class="site-navigation" id="site-navigation" aria-label="主导航">
      <a href="{{ "/docs/" | relLangURL }}"{{ if eq .Section "docs" }} class="active"{{ end }}>文档</a>
      {{ range .Site.Menus.main -}}
        <a href="{{ .URL | safeURL }}"{{ if strings.HasPrefix .URL "http" }} target="_blank" rel="noopener noreferrer"{{ end }}>{{ .Name }}</a>
      {{ end -}}
      <a class="nav-status" href="{{ "/#service-status" | relLangURL }}">
        <span aria-hidden="true"></span>服务状态
      </a>
    </nav>
  </div>
</header>
